# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build and Test

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'zulu'
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Cache SonarQube Cloud packages
      id: cache-sonar-scanner # ¡Este ID faltaba!
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Add dotnet tools to PATH
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Install/Update SonarQube Cloud scanner
      # El cache es solo de ~/.sonar/cache; el tool global no viene del cache.
      # Aseguramos que exista dotnet-sonarscanner aunque haya cache-hit.
      run: dotnet tool update --global dotnet-sonarscanner || dotnet tool install --global dotnet-sonarscanner

    - name: Restore dependencies
      run: dotnet restore
   
    - name: Sonarcloud start
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet-sonarscanner begin /k:"isauranina_-API-RESTful-Transacciones" /o:"isauranina" /d:sonar.token="$SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.opencover.reportsPaths="coverage/**/coverage.opencover.xml" /d:sonar.cs.cobertura.reportsPaths="coverage/**/coverage.cobertura.xml"
      # /d:sonar.qualitygate.wait=true
      
    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: |
        dotnet test --no-build \
        --verbosity normal src/Transacciones.Tests \
        --collect:"XPlat Code Coverage" \
        --results-directory ./coverage \
        -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover,cobertura

    - name: Sonarcloud end
      env:
       SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

    - name: Restore dotnet tools
      # Se asume que reportgenerator está en el manifiesto local del proyecto
      run: dotnet tool restore

    - name: Generate coverage report
      run: |
        dotnet tool run reportgenerator \
        -reports:"./coverage/**/coverage.cobertura.xml" \
        -targetdir:"./coverage/report" \
        -reporttypes:Html

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ./coverage/report
        retention-days: 7
