name: Staging to digitalocean

on:
  push:
    tags:
    - stage-*

jobs: 
  build:
   
    runs-on: ubuntu-latest
   
    steps:
      - name: Checkout files    
        uses: actions/checkout@v2
      - name: Copy Docker file
        run: cp ${{ github.workspace }}/docker-deploy/Dockerfile ${{ github.workspace }}/Dockerfile
      - name: Build and push Docker images
        uses: docker/build-push-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: inina14/api-restfull-transacciones
          tag_with_ref: true
          tag_with_sha: true
        
  deploy:
    needs: build
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout files    
        uses: actions/checkout@v2
        
      - name: Get tag name
        uses: olegtarasov/get-tag@v2.1
        
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
         token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
         
      # Placeholders en deploy.sh: __IMAGE_TAG__, __JWT_SECRET__, __MSSQL_SA_PASSWORD__
      # Usar | en sed para que contraseñas con / no rompan el comando.
      - name: Preparar deploy.sh (tag + secretos)
        run: |
          sed -i "s|__IMAGE_TAG__|${GIT_TAG_NAME}|g" deploy.sh
          sed -i "s|__JWT_SECRET__|${{ secrets.JWT_SECRET_KEY }}|g" deploy.sh
          sed -i "s|__MSSQL_SA_PASSWORD__|${{ secrets.MSSQL_SA_PASSWORD }}|g" deploy.sh
      - name: Crear Droplet
        run: |
          REGION="nyc3"
          IMAGE="docker-22-04"
          SIZE="s-2vcpu-8gb-intel"

          echo "Verificando size '${SIZE}' en region '${REGION}'..."
          if ! doctl compute size list --format Slug --no-header --region "${REGION}" | grep -Fxq "${SIZE}"; then
            echo "ERROR: size slug no disponible: ${SIZE}"
            echo "Sizes disponibles en ${REGION} (filtro 2vcpu/8gb):"
            doctl compute size list --format Slug,Memory,Vcpus,Disk --no-header --region "${REGION}" | grep -E "2vcpu|8192|8gb" || true
            exit 1
          fi

          doctl compute droplet create "${GIT_TAG_NAME}" \
            --region "${REGION}" \
            --size "${SIZE}" \
            --image "${IMAGE}" \
            --user-data-file deploy.sh \
            --wait

    
