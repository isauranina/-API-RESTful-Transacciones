# Docker Compose para desarrollo local:
# - SQL Server
# - API .NET (Transacciones.API)
#
# Uso: copia .env.example a .env, ajusta secretos y ejecuta:
#   docker compose up -d
#
# API local en: http://localhost:5035/swagger
# Nota: dentro de la red de Docker, el host de SQL es "sqlserver" (no localhost).

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transacciones-api
    restart: unless-stopped
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:5035
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Define JWT_SECRET_KEY in .env (see .env.example)}
      ConnectionStrings__TransaccionesConnection: Server=sqlserver,1433;Database=DB_TRANSACCIONES;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
    ports:
      - "5035:5035"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: transacciones-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Define MSSQL_SA_PASSWORD in .env (see .env.example)}
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
